name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch/environment to deploy'
        required: true
        default: production
        type: choice
        options:
          - production
          - main
          - staging
      ref:
        description: 'Git ref to deploy. Defaults to branch.'
        required: false
        type: string
        default: ''
  workflow_run:
    workflows: [CI Tests]
    types: [completed]
    branches: [production, main, staging]

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.event.workflow_run.head_branch }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || inputs.branch) || github.event.workflow_run.head_sha }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Resolve deploy SHA
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci

      - name: Load Shadow Atlas build vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '019d1184e655db74b7589794a2a2a533'
          CF_PAGES_PROJECT: communique-site
        run: |
          response=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CF_PAGES_PROJECT}")

          atlas_url=$(printf '%s' "$response" | jq -r '.result.deployment_configs.production.env_vars.VITE_ATLAS_BASE_URL.value // empty')
          if [ -z "$atlas_url" ]; then
            echo "::error::VITE_ATLAS_BASE_URL is not set on Cloudflare Pages project ${CF_PAGES_PROJECT}."
            exit 1
          fi

          echo "VITE_ATLAS_BASE_URL=$atlas_url" >> "$GITHUB_ENV"
          echo "Using VITE_ATLAS_BASE_URL=$atlas_url"

      - name: Resolve build environment
        run: |
          case "${DEPLOY_BRANCH}" in
            production)
              echo "VITE_ENVIRONMENT=production" >> "$GITHUB_ENV"
              ;;
            staging)
              echo "VITE_ENVIRONMENT=staging" >> "$GITHUB_ENV"
              ;;
            *)
              echo "VITE_ENVIRONMENT=development" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Build
        run: npm run build
        env:
          PUBLIC_CONVEX_URL: https://quirky-chinchilla-352.convex.cloud
          VITE_ENVIRONMENT: ${{ env.VITE_ENVIRONMENT }}

      - name: Resolve deployment URL
        run: |
          case "${DEPLOY_BRANCH}" in
            production) echo "DEPLOY_PUBLIC_URL=https://commons.email" >> "$GITHUB_ENV" ;;
            staging) echo "DEPLOY_PUBLIC_URL=https://staging.commons.email" >> "$GITHUB_ENV" ;;
            main) echo "DEPLOY_PUBLIC_URL=https://main.communique-site.pages.dev" >> "$GITHUB_ENV" ;;
            *) echo "DEPLOY_PUBLIC_URL=https://${DEPLOY_BRANCH}.communique-site.pages.dev" >> "$GITHUB_ENV" ;;
          esac

      - name: Deploy
        run: |
          set -o pipefail
          deploy_output=$(mktemp)
          npx wrangler pages deploy .svelte-kit/cloudflare --project-name communique-site --branch "$DEPLOY_BRANCH" --commit-hash "$DEPLOY_SHA" 2>&1 | tee "$deploy_output"
          deployment_url=$(sed -nE 's/.*Take a peek over at (https:\/\/[a-z0-9-]+\.communique-site\.pages\.dev).*/\1/p' "$deploy_output" | head -n 1)

          if [ -z "$deployment_url" ]; then
            echo "::error::Unable to parse immutable Cloudflare Pages deployment URL from wrangler output."
            cat "$deploy_output"
            exit 1
          fi

          echo "DEPLOY_HEALTH_URL=${deployment_url}" >> "$GITHUB_ENV"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '019d1184e655db74b7589794a2a2a533'

      - name: Purge CDN cache
        if: env.DEPLOY_BRANCH == 'production'
        run: |
          response=$(curl -sS --max-time 30 -w "\n%{http_code}" -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}') || {
              echo "::warning::Cloudflare cache purge request failed; deployment health check will still run."
              exit 0
            }

          http_status=$(printf '%s\n' "$response" | tail -n 1)
          body=$(printf '%s\n' "$response" | sed '$d')

          if ! [[ "$http_status" =~ ^[0-9]{3}$ ]]; then
            echo "::warning::Cloudflare cache purge returned an unreadable HTTP status; deployment health check will still run."
            exit 0
          fi

          if (( http_status < 200 || http_status >= 300 )); then
            echo "::warning::Cloudflare cache purge returned HTTP ${http_status}; deployment health check will still run."
            exit 0
          fi

          if ! echo "$body" | jq -e '.success == true' >/dev/null; then
            echo "::warning::Cloudflare cache purge response did not report success; deployment health check will still run."
          fi

      - name: Verify deployment health
        run: |
          strict_atlas=false
          if [ "$DEPLOY_BRANCH" = "production" ]; then
            strict_atlas=true
          fi

          for attempt in {1..12}; do
            if response=$(curl -sS --max-time 20 -w "\n%{http_code}" "$DEPLOY_HEALTH_URL/api/health"); then
              http_status=$(printf '%s\n' "$response" | tail -n 1)
              body=$(printf '%s\n' "$response" | sed '$d')

              if echo "$body" | jq -e . >/dev/null 2>&1; then
                echo "$body"

                if [ "$strict_atlas" = "true" ]; then
                  if [ "$http_status" = "200" ] && echo "$body" | jq -e '.status == "ok"' >/dev/null; then
                    exit 0
                  fi
                elif echo "$body" | jq -e '.convex == true and .atlas.configured == true and .atlas.manifest == true and .atlas.districtIndex == true' >/dev/null; then
                  if ! echo "$body" | jq -e '.atlas.rootPinned == true and .atlas.depthPinned == true' >/dev/null; then
                    echo "::warning::Non-production deploy health has atlas content reachable but root/depth are not pinned yet."
                  fi
                  exit 0
                fi
              else
                echo "Deployment health endpoint returned HTTP ${http_status} and a non-JSON body:"
                printf '%s\n' "$body" | head -c 4000
                printf '\n'
              fi
            else
              echo "Deployment health check failed on attempt ${attempt} before an HTTP response."
            fi

            echo "Deployment health check failed on attempt ${attempt}; retrying..."
            sleep 10
          done
          exit 1

      - name: Probe production domain health
        if: env.DEPLOY_BRANCH == 'production'
        run: |
          domain_challenged=false
          domain_hard_failure=false
          for attempt in {1..12}; do
            if response=$(curl -sS --max-time 20 -w "\n%{http_code}" "$DEPLOY_PUBLIC_URL/api/health"); then
              http_status=$(printf '%s\n' "$response" | tail -n 1)
              body=$(printf '%s\n' "$response" | sed '$d')

              if [ "$http_status" = "200" ] && echo "$body" | jq -e '.status == "ok"' >/dev/null 2>&1; then
                echo "$body"
                exit 0
              fi

              if echo "$body" | jq -e . >/dev/null 2>&1; then
                echo "$body"
                echo "::error::Production domain health endpoint returned JSON but not status ok."
                exit 1
              fi

              if [ "$http_status" = "403" ] && printf '%s' "$body" | grep -Eiq 'Just a moment|cf_chl|challenge-platform'; then
                domain_challenged=true
              else
                domain_hard_failure=true
              fi

              echo "Production domain probe attempt ${attempt} returned HTTP ${http_status}:"
              printf '%s\n' "$body" | head -c 4000
              printf '\n'
            else
              echo "Production domain probe failed on attempt ${attempt} before an HTTP response."
            fi

            if [ "$attempt" = "12" ]; then
              if [ "$domain_challenged" = "true" ] && [ "$domain_hard_failure" = "false" ]; then
                echo "::warning::Production domain health was blocked by a Cloudflare challenge from the GitHub runner; complete external release smoke against ${DEPLOY_PUBLIC_URL}/api/health."
                exit 0
              fi
              if [ "$domain_hard_failure" = "true" ]; then
                echo "::error::Production domain health returned an unexpected response."
                exit 1
              fi
              echo "::warning::Production domain health could not be verified from GitHub-hosted runners; complete external release smoke against ${DEPLOY_PUBLIC_URL}/api/health."
              exit 0
            fi

            sleep 10
          done

      - name: Probe production browser-mediated mDL route
        if: env.DEPLOY_BRANCH == 'production'
        run: |
          route_challenged=false
          route_hard_failure=false
          for attempt in {1..12}; do
            if response=$(curl -sS --max-time 20 -w "\n%{http_code}" \
              -X POST \
              -H "Accept: application/json" \
              -H "Origin: ${DEPLOY_PUBLIC_URL}" \
              "${DEPLOY_PUBLIC_URL}/api/identity/verify-mdl/start"); then
              http_status=$(printf '%s\n' "$response" | tail -n 1)
              body=$(printf '%s\n' "$response" | sed '$d')

              if [ "$http_status" = "401" ] && echo "$body" | jq -e '.message == "Authentication required"' >/dev/null 2>&1; then
                echo "Production browser-mediated mDL route is live and requires authentication."
                exit 0
              fi

              if [ "$http_status" = "403" ] && printf '%s' "$body" | grep -Eiq 'Just a moment|cf_chl|challenge-platform'; then
                route_challenged=true
              else
                route_hard_failure=true
              fi

              echo "Production browser-mediated mDL route attempt ${attempt} returned HTTP ${http_status}:"
              printf '%s\n' "$body" | head -c 4000
              printf '\n'
            else
              echo "Production browser-mediated mDL route attempt ${attempt} failed before an HTTP response."
            fi

            if [ "$attempt" = "12" ]; then
              if [ "$route_challenged" = "true" ] && [ "$route_hard_failure" = "false" ]; then
                echo "::warning::Production browser-mediated mDL route was blocked by a Cloudflare challenge from the GitHub runner; complete external route smoke against ${DEPLOY_PUBLIC_URL}/api/identity/verify-mdl/start."
                exit 0
              fi
              if [ "$route_hard_failure" = "true" ]; then
                echo "::error::Production browser-mediated mDL route did not return the expected authentication gate."
                exit 1
              fi
              echo "::warning::Production browser-mediated mDL route could not be verified from GitHub-hosted runners; complete external route smoke against ${DEPLOY_PUBLIC_URL}/api/identity/verify-mdl/start."
              exit 0
            fi

            sleep 10
          done

      - name: Probe production mDL readiness
        if: env.DEPLOY_BRANCH == 'production'
        env:
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        run: |
          if [ -z "${INTERNAL_API_SECRET:-}" ]; then
            echo "::error::INTERNAL_API_SECRET is not configured as a GitHub secret."
            exit 1
          fi

          readiness_challenged=false
          readiness_hard_failure=false
          for attempt in {1..12}; do
            if response=$(curl -sS --max-time 20 -w "\n%{http_code}" \
              -H "X-Internal-Secret: ${INTERNAL_API_SECRET}" \
              -H "X-Readiness-Origin: ${DEPLOY_PUBLIC_URL}" \
              "${DEPLOY_HEALTH_URL}/api/internal/identity/mdl-readiness"); then
              http_status=$(printf '%s\n' "${response}" | tail -n 1)
              body=$(printf '%s\n' "${response}" | sed '$d')

              if [ "${http_status}" = "200" ] && echo "${body}" | jq -e '.status == "ok"' >/dev/null 2>&1; then
                echo "${body}" | jq '{status, blockers, warnings}'
                exit 0
              fi

              if echo "${body}" | jq -e . >/dev/null 2>&1; then
                echo "${body}" | jq '{status, blockers, warnings, checks: [.checks[]? | select(.status != "ok")]}'
                readiness_hard_failure=true
              else
                if [ "${http_status}" = "403" ] && printf '%s' "${body}" | grep -Eiq 'Just a moment|cf_chl|challenge-platform'; then
                  readiness_challenged=true
                else
                  readiness_hard_failure=true
                fi
                echo "Production mDL readiness attempt ${attempt} returned HTTP ${http_status} and a non-JSON body:"
                printf '%s\n' "${body}" | head -c 4000
                printf '\n'
              fi
            else
              echo "Production mDL readiness attempt ${attempt} failed before an HTTP response."
              readiness_hard_failure=true
            fi

            if [ "${attempt}" = "12" ]; then
              if [ "${readiness_challenged}" = "true" ] && [ "${readiness_hard_failure}" = "false" ]; then
                echo "::error::Production mDL readiness was blocked by a Cloudflare challenge from the GitHub runner."
              fi
              echo "::error::Production browser-mediated mDL did not pass internal readiness."
              exit 1
            fi

            sleep 10
          done
