name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: [CI Tests]
    types: [completed]
    branches: [production, main, staging]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CONVEX_URL: https://quirky-chinchilla-352.convex.cloud

      - name: Resolve deployment URL
        run: |
          case "${DEPLOY_BRANCH}" in
            production) echo "DEPLOY_URL=https://commons.email" >> "$GITHUB_ENV" ;;
            staging) echo "DEPLOY_URL=https://staging.commons.email" >> "$GITHUB_ENV" ;;
            main) echo "DEPLOY_URL=https://main.communique-site.pages.dev" >> "$GITHUB_ENV" ;;
            *) echo "DEPLOY_URL=https://${DEPLOY_BRANCH}.communique-site.pages.dev" >> "$GITHUB_ENV" ;;
          esac

      - name: Deploy
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name communique-site --branch "$DEPLOY_BRANCH" --commit-hash "$DEPLOY_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '019d1184e655db74b7589794a2a2a533'

      - name: Purge CDN cache
        if: github.event.workflow_run.head_branch == 'production'
        run: |
          response=$(curl --fail-with-body -sS -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          echo "$response" | jq -e '.success == true' >/dev/null

      - name: Verify deployment health
        run: |
          for attempt in {1..12}; do
            if response=$(curl --fail-with-body -sS --max-time 20 "$DEPLOY_URL/api/health"); then
              echo "$response"
              echo "$response" | jq -e '.status == "ok"' >/dev/null && exit 0
            fi
            echo "Deployment health check failed on attempt ${attempt}; retrying..."
            sleep 10
          done
          exit 1
