name: Deploy to Cloudflare Pages

on:
  push:
    branches: [production, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_CONVEX_URL: https://quirky-chinchilla-352.convex.cloud

      - name: Deploy
        run: npx wrangler pages deploy .svelte-kit/cloudflare --project-name communique-site --branch ${{ github.ref_name }} --commit-hash ${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "019d1184e655db74b7589794a2a2a533"
