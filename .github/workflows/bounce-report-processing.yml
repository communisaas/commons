name: Process Bounce Reports

on:
  schedule:
    # Every 5 minutes — probes pending bounce reports via Reacher SMTP
    # Also auto-resolves stale reports (>30 days)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Process pending bounce reports
        id: process
        run: |
          echo "Processing bounce reports at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: GitHub-Actions-Cron" \
            --max-time 60 \
            "${{ secrets.APP_URL }}/api/cron/process-bounce-reports")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"
          echo "http_code=$http_code" >> $GITHUB_OUTPUT
          echo "response=$body" >> $GITHUB_OUTPUT

          if [ "$http_code" != "200" ]; then
            echo "::error::Bounce report processing failed with HTTP $http_code"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Bounce Report Processing" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** ${{ steps.process.outputs.http_code }}" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.process.outputs.response }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
